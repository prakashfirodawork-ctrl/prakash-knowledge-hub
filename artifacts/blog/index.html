<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />
    <title>Prakash Knowledge Hub</title>
    <meta name="description" content="AI, Pi Network, Web3, Data Analytics, Personal Branding and Digital Growth Insights by Prakash Choudhary." />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#5E3A99" />

    <!-- Open Graph -->
    <meta property="og:title" content="Prakash Knowledge Hub" />
    <meta property="og:description" content="AI, Pi Network, Web3, Data Analytics, Personal Branding and Digital Growth Insights by Prakash Choudhary." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/author-prakash.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@PiProtecter" />
    <meta name="twitter:title" content="Prakash Knowledge Hub" />
    <meta name="twitter:description" content="AI, Pi Network, Web3, Data Analytics, Personal Branding and Digital Growth Insights by Prakash Choudhary." />
    <meta name="twitter:image" content="/images/author-prakash.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://prakashknowledgehub.com/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://prakashknowledgehub.com/#website",
          "url": "https://prakashknowledgehub.com/",
          "name": "Prakash Knowledge Hub",
          "description": "AI, Pi Network, Web3, Data Analytics, Personal Branding and Digital Growth Insights by Prakash Choudhary.",
          "publisher": { "@id": "https://prakashknowledgehub.com/#person" },
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://prakashknowledgehub.com/search?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Person",
          "@id": "https://prakashknowledgehub.com/#person",
          "name": "Prakash Choudhary",
          "url": "https://prakashknowledgehub.com/author",
          "image": "https://prakashknowledgehub.com/images/author-prakash.png",
          "jobTitle": "AI Educator, Digital Builder & Web3 Advocate",
          "description": "Helping students, professionals, entrepreneurs, and businesses leverage technology for growth.",
          "sameAs": [
            "https://www.linkedin.com/in/prakashphiroda",
            "https://x.com/PiProtecter",
            "https://www.facebook.com/prakashphiroda",
            "https://www.instagram.com/prakashphiroda",
            "https://prakashfirodawork-ctrl.github.io/Prakash-Identity-Hub"
          ]
        }
      ]
    }
    </script>
  </body>
</html>
